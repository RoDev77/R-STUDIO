<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>R STUDIO LAB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ SEO Meta Tags -->
  <meta name="description" content="Masuk ke R Studio Lab untuk mengakses konten eksklusif, materi, dan layanan kami.">
  <meta name="robots" content="noindex, nofollow">

  <!-- ✅ Open Graph (tampilan di Google / share link) -->
  <meta property="og:title" content="Login – R Studio Lab">
  <meta property="og:description" content="Masuk ke R Studio Lab untuk mengakses konten eksklusif, materi, dan layanan kami.">
  <meta property="og:image" content="https://www.rstudiolab.online/images/RSLogo.png">
  <meta property="og:url" content="https://www.rstudiolab.online/login.html">
  <meta property="og:type" content="website">

  <!-- Tambahkan di <head> index.html, home.html, login.html, dll -->
  <link rel="canonical" href="https://www.rstudiolab.online/login.html">
  <link rel="icon" type="image/png" href="/images/RSLogo.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/RSLogo.png">
  <link rel="apple-touch-icon" href="./images/RSLogo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-card">

    <div class="brand">
      <div class="logo">
        <img src="./images/RSLogo.png" alt="R Studio Logo">
      </div>
      <h1>R STUDIO</h1>
    </div>

    <h2>Login</h2>
    <p class="subtitle">Log in to view content</p>

    <form id="loginForm">

      <div class="input-group">
        <span class="icon">📧</span>
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        >
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        >
        <span class="toggle" id="togglePwd">👁️</span>
      </div>

      <button type="submit" id="loginBtn">
        <span class="btn-text">Masuk</span>
        <span class="spinner"></span>
      </button>

    </form>

    <div class="footer">
      <a href="reset-password.html" class="reset-link">
        🔑 Lupa / Reset Password
      </a>

      <div class="divider"></div>

      <span>Belum punya akun?</span>
      <a href="register.html">Daftar sekarang</a>
    </div>

  </div> <!-- /.login-card -->

  <script type="module" src="./login.js"></script>

</body>
</html>
